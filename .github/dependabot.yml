version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - ci

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
    open-pull-requests-limit: 3
    groups:
      web-runtime:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - web

  - package-ecosystem: cargo
    directory: /daemon
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
    open-pull-requests-limit: 3
    groups:
      rust-runtime:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - runtime
