name: Release

on:
  push:
    tags:
      - "squad-v*"
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 0.1.0"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        default: stable
        type: choice
        options:
          - stable
          - beta
          - canary
      draft:
        description: "Create the GitHub release as a draft"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BUN_VERSION: "1.3.13"
  CARGO_TERM_COLOR: always

jobs:
  release-meta:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      channel: ${{ steps.meta.outputs.channel }}
      draft: ${{ steps.meta.outputs.draft }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - id: meta
        name: Resolve release metadata
        shell: bash
        run: |
          input_version='${{ inputs.version }}'
          input_channel='${{ inputs.channel }}'
          input_draft='${{ inputs.draft }}'
          input_prerelease='${{ inputs.prerelease }}'

          if [ -n "$input_version" ]; then
            version="$input_version"
          else
            version="${GITHUB_REF_NAME#squad-v}"
            version="${version#v}"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="squad-v${version}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          channel="${input_channel:-stable}"
          draft="${input_draft:-false}"
          prerelease="${input_prerelease:-false}"
          if [ "$channel" != "stable" ]; then
            prerelease="true"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  web-bundle:
    name: Web bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: release-meta
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        run: bun run build

      - name: Package web server bundle
        shell: bash
        run: |
          mkdir -p release/web
          web_asset="release/web/autohand-squad-web-${{ needs.release-meta.outputs.version }}.tar.gz"
          tar -czf "$web_asset" \
            dist \
            server.mjs \
            package.json \
            bun.lock \
            README.md
          shasum -a 256 "$web_asset" > release/web/checksums-web.txt

      - name: Upload web bundle
        uses: actions/upload-artifact@v7
        with:
          name: web-bundle-${{ needs.release-meta.outputs.version }}
          path: release/web
          if-no-files-found: error

  runtime-artifacts:
    name: Runtime artifacts (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    needs: release-meta
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux tray dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev pkg-config

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Cache Cargo packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            daemon/target
          key: cargo-release-${{ runner.os }}-${{ hashFiles('daemon/Cargo.lock') }}
          restore-keys: |
            cargo-release-${{ runner.os }}-

      - name: Build release binaries
        shell: bash
        run: cargo build --release --bins -j1
        working-directory: daemon

      - name: Package release assets
        shell: bash
        run: |
          RELEASE_VERSION='${{ needs.release-meta.outputs.version }}' \
          RELEASE_TAG='${{ needs.release-meta.outputs.tag }}' \
          RELEASE_CHANNEL='${{ needs.release-meta.outputs.channel }}' \
          bun run release:package

      - name: Upload runtime artifacts
        uses: actions/upload-artifact@v7
        with:
          name: runtime-${{ runner.os }}-${{ runner.arch }}
          path: release
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - release-meta
      - web-bundle
      - runtime-artifacts
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download runtime artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-downloads
          pattern: runtime-*
          merge-multiple: true

      - name: Download web bundle
        uses: actions/download-artifact@v8
        with:
          path: release-downloads/web
          pattern: web-bundle-*
          merge-multiple: true

      - name: Merge installer manifest
        shell: bash
        run: |
          RELEASE_VERSION='${{ needs.release-meta.outputs.version }}' \
          RELEASE_CHANNEL='${{ needs.release-meta.outputs.channel }}' \
          node scripts/merge-release-manifests.mjs release-downloads

          mkdir -p release/publish
          find release-downloads -type f \( -name 'squad-*' -o -name 'autohand-squad-*' -o -name 'checksums-*.txt' \) -exec cp {} release/publish/ \;
          cp "release/manifest-${{ needs.release-meta.outputs.channel }}.json" release/publish/
          cp release/checksums.txt release/publish/
          cp release/release-summary.md release/publish/

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: release/publish/*

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-meta.outputs.tag }}
          RELEASE_VERSION: ${{ needs.release-meta.outputs.version }}
          RELEASE_DRAFT: ${{ needs.release-meta.outputs.draft }}
          RELEASE_PRERELEASE: ${{ needs.release-meta.outputs.prerelease }}
        shell: bash
        run: |
          flags=()
          if [ "$RELEASE_DRAFT" = "true" ]; then
            flags+=(--draft)
          fi
          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            flags+=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release/publish/* --clobber
            gh release edit "$RELEASE_TAG" --title "Autohand Squad ${RELEASE_VERSION}" --notes-file release/release-summary.md "${flags[@]}"
          else
            gh release create "$RELEASE_TAG" release/publish/* \
              --title "Autohand Squad ${RELEASE_VERSION}" \
              --notes-file release/release-summary.md \
              --target "$GITHUB_SHA" \
              "${flags[@]}"
          fi
