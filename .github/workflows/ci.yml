name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.13"
  CARGO_TERM_COLOR: always

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check web server syntax
        run: bun run check:server

      - name: Build web app
        run: bun run build

      - name: Upload web build
        uses: actions/upload-artifact@v7
        with:
          name: web-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 7

  runtime:
    name: Runtime checks (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux tray dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev pkg-config

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Cache Cargo packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            daemon/target
          key: cargo-${{ runner.os }}-${{ hashFiles('daemon/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt -- --check
        working-directory: daemon

      - name: Run runtime tests
        run: cargo test -j1
        working-directory: daemon

      - name: Build runtime binaries
        run: cargo build --bins -j1
        working-directory: daemon

  dry-run-meta:
    name: Dry-run release metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      channel: ${{ steps.meta.outputs.channel }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: meta
        name: Resolve PR/canary dry-run version
        run: node scripts/resolve-squad-version.mjs --mode dry-run
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}

  release-dry-run:
    name: Release dry run (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    needs:
      - web
      - runtime
      - dry-run-meta
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux tray dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev pkg-config

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Build release binaries
        run: cargo build --release --bins -j1
        working-directory: daemon

      - name: Package release manifest
        shell: bash
        run: |
          RELEASE_VERSION='${{ needs.dry-run-meta.outputs.version }}' \
          RELEASE_TAG='${{ needs.dry-run-meta.outputs.tag }}' \
          RELEASE_CHANNEL='${{ needs.dry-run-meta.outputs.channel }}' \
          bun run release:package

      - name: Upload dry-run release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-dry-run-${{ runner.os }}-${{ runner.arch }}
          path: release
          if-no-files-found: error
          retention-days: 7

  validate-release-manifest:
    name: Validate release manifest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: release-dry-run
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download dry-run release assets
        uses: actions/download-artifact@v8
        with:
          path: release-downloads
          pattern: release-dry-run-*
          merge-multiple: true

      - name: Merge and validate platform manifests
        run: REQUIRED_RELEASE_OS=linux,darwin,win32 node scripts/merge-release-manifests.mjs release-downloads

      - name: Upload merged dry-run manifest
        uses: actions/upload-artifact@v7
        with:
          name: release-manifest-${{ github.sha }}
          path: release
          if-no-files-found: error
          retention-days: 7
