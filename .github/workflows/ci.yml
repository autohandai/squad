name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.13"
  CARGO_TERM_COLOR: always

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check web server syntax
        run: bun run check:server

      - name: Build web app
        run: bun run build

      - name: Upload web build
        uses: actions/upload-artifact@v7
        with:
          name: web-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 7

  runtime:
    name: Runtime checks (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux tray dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev pkg-config

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Cache Cargo packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            daemon/target
          key: cargo-${{ runner.os }}-${{ hashFiles('daemon/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt -- --check
        working-directory: daemon

      - name: Run runtime tests
        run: cargo test -j1
        working-directory: daemon

      - name: Build runtime binaries
        run: cargo build --bins -j1
        working-directory: daemon

  release-dry-run:
    name: Release dry run
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - web
      - runtime
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux tray dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev pkg-config

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        run: bun run build

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Build release binaries
        run: cargo build --release --bins -j1
        working-directory: daemon

      - name: Package release manifest
        run: |
          RELEASE_VERSION=0.0.0-ci \
          RELEASE_TAG=ci-${{ github.sha }} \
          RELEASE_OS=linux \
          RELEASE_ARCH=x64 \
          bun run release:package

      - name: Merge release manifest
        run: bun run release:merge-manifests release/linux-x64/manifest-linux-x64.json

      - name: Upload dry-run release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-dry-run-${{ github.sha }}
          path: release
          if-no-files-found: error
          retention-days: 7
