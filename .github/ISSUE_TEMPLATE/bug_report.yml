name: Bug report
description: Report a reproducible Autohand Squad problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find the same problem.
          required: true
        - label: This report does not disclose a security vulnerability or secret.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Web UI
        - CLI launcher
        - Daemon
        - Analytics
        - Tray or menu bar
        - Installer or updater
        - Release pipeline
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Squad version
      description: Use the release version or commit SHA you tested.
      placeholder: 0.1.0-rc.3 or 416078f

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Include your operating system, architecture, browser, and Autohand CLI version when relevant.
      placeholder: macOS 15, Apple Silicon, Chrome 140, Autohand CLI 1.2.3
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run `squad`
        2. Click ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste only relevant evidence with credentials, private prompts, customer data, and local paths removed.
      render: shell
